<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Career Application</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f6fb;font-family:Arial,sans-serif;color:#123669;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f3f6fb;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:680px;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#123b73;padding:18px 24px;">
                <h1 style="margin:0;font-size:20px;line-height:1.3;color:#ffffff;font-weight:700;">
                  New Career Application
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 24px;">
                <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;color:#334155;">
                  A new candidate has applied for a position at BioPathogenix.
                </p>

                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:separate;border-spacing:0 10px;">
                  <tr>
                    <td style="width:180px;font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Role</td>
                    <td style="font-size:14px;color:#334155;">{{ role_title }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Applicant Name</td>
                    <td style="font-size:14px;color:#334155;">{{ full_name }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Email</td>
                    <td style="font-size:14px;color:#334155;">{{ email }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Phone</td>
                    <td style="font-size:14px;color:#334155;">{{ phone }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">LinkedIn</td>
                    <td style="font-size:14px;color:#334155;">{{ linkedin_url }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Submitted At</td>
                    <td style="font-size:14px;color:#334155;">{{ submitted_at }}</td>
                  </tr>
                  <tr>
                    <td style="font-size:14px;font-weight:700;color:#0f2f59;vertical-align:top;">Message</td>
                    <td style="font-size:14px;color:#334155;white-space:pre-line;">{{ message }}</td>
                  </tr>
                </table>

                <p style="margin:18px 0 0 0;font-size:14px;line-height:1.6;color:#475569;">
                  Resume is attached to this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
