<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>New Assay Inquiry Request</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #1d3557; line-height: 1.6;">
    <h2 style="margin-bottom: 8px;">New Assay Development Inquiry</h2>
    <p style="margin-top: 0;">A new inquiry has been submitted from the Assay Development page.</p>

    <table cellpadding="6" cellspacing="0" border="0" style="border-collapse: collapse;">
      <tr>
        <td><strong>Name:</strong></td>
        <td>{{ name }}</td>
      </tr>
      <tr>
        <td><strong>Work Email:</strong></td>
        <td>{{ work_email }}</td>
      </tr>
      <tr>
        <td><strong>Organization / Lab:</strong></td>
        <td>{{ organization_lab }}</td>
      </tr>
      <tr>
        <td><strong>Help Needed:</strong></td>
        <td>{{ help_type }}</td>
      </tr>
      <tr>
        <td><strong>Additional Details:</strong></td>
        <td>{{ additional_details }}</td>
      </tr>
    </table>
  </body>
</html>
